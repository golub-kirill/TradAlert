# ─────────────────────────────────────────────────────────────────────────────
# TradAlert — filters.yaml
# Read by FilterEngine (src/core/filter_engine.py) and chart.py (RSI bands).
# ─────────────────────────────────────────────────────────────────────────────


# ── SCAN FILTERS ──────────────────────────────────────────────────────────────

price: # block: hard price floor
  min_price: 5.00                       # USD/CAD; rows with close < min_price fail scan

liquidity: # block: dollar-volume floor
  min_dollar_volume_20d: 5_000_000      # 20-day average; rows below fail scan

market_cap: # block: market-cap floor
  min_market_cap: 300_000_000           # USD; None (ETF/index) skips the gate

volatility: # block: ATR% band [min, max]
  min_atr_pct: 1.0                      # atr/close*100 floor; reject illiquid/dead names
  max_atr_pct: 8.0                      # atr/close*100 ceiling; reject blow-off vol


# ── TREND ─────────────────────────────────────────────────────────────────────

trend: # block: ticker-trend MA stack
  ma_fast: 50                           # MA(50) for trend classification + ticker_trend
  ma_slow: 200                          # MA(200); also drives _min_rows_guard


# ── MARKET REGIME ─────────────────────────────────────────────────────────────

regime: # block: broad-market regime classifier
  index_symbols: [ SPY, QQQ ]      # indices voted for trend; vs each MA(ma_fast)
  vix_symbol: ^VIX            # volatility series; resolved by fetcher
  vix_low: 20              # VIX close below → volatility = LOW
  vix_high: 28              # VIX close above → volatility = HIGH
  require_all_indices: true            # true: unanimous vote; false: majority vote
  ma_short: 20                         # secondary short-term MA for regime alignment
  require_ma_short_alignment: false     # true: all indices must also be above MA(ma_short)
  vix_slope_block: false               # opt-in: block fresh momentum entries when VIX is
  # rising over the lookback window, even at low VIX level.
  vix_slope_lookback_days: 5           # bars looked back when computing vix_rising


# ── EVENTS ────────────────────────────────────────────────────────────────────

events: # block: calendar gates
  earnings_buffer_days: 5               # block new longs within N days of next earnings
  earnings_buffer_two_sided: false      # opt-in: also block N days AFTER the last earnings
  # (A/B lever, default OFF → byte-identical; incompatible with signals.pead —
  # PEAD deliberately enters the post-earnings window)

  stop_dates: # signal blackout calendar; suppresses ENTRIES only — exits on held positions always proceed
    - id: 1                             # row id; logged in the block reason
      date: "2026-05-14"                # ISO date; matched against engine._today
      description: "Trump-Xi summit Beijing day 1"
    - id: 2                             # row id
      date: "2026-05-15"                # ISO date
      description: "Trump-Xi summit Beijing day 2"


# ── EXECUTION MODEL ───────────────────────────────────────────────────────────

execution: # block: backtest fill model
  entry_slippage_pct: 0.0020            # 0.20% added to bar_open on long fills;
                                        # conservative friction default (results
                                        # are sensitive to slippage)
  # Exit-side slippage on MARKET-type exit fills (stop / engine_exit / time_stop /
  # open_eod; target limit fills stay exact). 0.0 = off — the shipped headline
  # fills exits frictionless, a KNOWN optimism: symmetric 0.002 measured
  # −58.7R / −0.29 Sharpe on the pinned snapshot (2026-07-11 paired A/B).
  # Opt in here or via --exit-slippage-pct; changing the default needs a
  # recorded decision + re-quoted headline.
  exit_slippage_pct: 0.0
  commission_r: 0.0050            # round-trip cost in R; subtracted from r_multiple
  # Time-based max-hold (swing-horizon) exit. Closes a still-open trade at the
  # bar CLOSE once held N trading bars; stop/target on the same bar win first.
  # Override with --max-hold-days N / --max-hold-mode.
  max_hold_days: 25                     # swing horizon; best risk-adjusted <=30 bars
  max_hold_mode: if_not_profit          # exit at the cap only when NOT in profit
                                        # (lets winners run; 'hard' = always exit).
                                        # if_not_profit dominates hard on every
                                        # metric (ADR-001).
  # Breakeven stop: once a trade's best excursion reaches this many R, the
  # stop moves to entry — protects the give-back leak without capping the
  # upside (ADR-004: +6.8R, +0.04 Sharpe, −7R maxDD in the paired snapshot
  # A/B; WF-OOS stable; the R denominator stays the INITIAL stop).
  # Absent or 0 = off. Override with --breakeven-trigger-r (0 disables).
  breakeven_trigger_r: 1.0


# ── SIGNAL FILTERS ────────────────────────────────────────────────────────────

signals: # block: trigger configuration

  # Magnitude gates are ATR-relative: |macd_hist[t] - macd_hist[t-1]|
  # must be >= min_hist_delta_atr * row.atr (e.g. 0.05 = ~5% of one ATR).
  # ATR-scaling keeps the threshold consistent across $7 and $400 names.

  allow_shorts: false                # Short-side master switch. When false, no short
  # entries are emitted and the baseline backtest replays
  # bit-identical. Enable via --allow-shorts on run_backtest.py.

  hard_to_borrow_list: [ ]            # Symbols that cannot be shorted
  # (hard-to-borrow / unavailable). Short entries on
  # these are blocked; longs unaffected. e.g. [GME, AMC].

  borrow: # Stock-borrow cost for shorts.
    annual_rate_default: 0.03        #   3%/yr default; 0.0 = off. Charged only on
                                     #   shorts (--allow-shorts); longs never pay.
    per_ticker: { }                   #   per-symbol overrides, e.g. {GME: 0.30}.
    # Folded into Trade.effective_r as an R drag ∝ bars_held; flat configured rate.

  require_trigger_bar_up: true      # opt-in: only queue T+1 entry when trigger
  # bar T closed >= open (no red-bar entries; cuts fast stop-outs).

  momentum: # block: trend-following triggers
    long: # entry: macd_hist crosses up + RSI in band + delta gate
      rsi_min: 50                       # inclusive floor for momentum long
      rsi_max: 70                       # inclusive ceiling for momentum long
      min_hist_delta_atr: 0.08          # ATR-multiple; (row - prev) >= this * atr
      max_bars_since_cross: 3           # block entries if MACD zero-cross happened >N bars ago (stale signal)
    short: # held-long exit: fade trigger; reused by _momentum_fade_exit
      rsi_min: 30                       # inclusive floor for fade trigger
      rsi_max: 65                       # MACD zero-cross after a run lands at RSI 45-65; 45 would block all fades
      min_hist_delta_atr: 0.18          # ATR-multiple; (row - prev) <= -this * atr
    short_entry: # Fresh short on downside momentum
      rsi_min: 30                       # inclusive floor (very oversold blocks new shorts)
      rsi_max: 50                       # inclusive ceiling — short into weakness, not extremes
      min_hist_delta_atr: 0.08          # ATR-multiple; (row - prev) <= -this * atr (negative delta)
      max_bars_since_cross: 3           # stale-signal guard

  gap_risk: # block: overnight gap risk filter
    enabled: true                       # true: block entries when prev bar range is too wide
    max_prev_bar_range_atr: 3.0         # block if prev (high-low) > N * ATR (elevated overnight risk)

  sector_gate: # block: sector-relative strength filter
    enabled: true                       # true: block entries when sector ETF < MA(ma_fast)
    sector_map_path: "config/sector_map.yaml"  # path to sector_map.yaml relative to project root

  mean_reversion: # block: counter-trend triggers
    long: # entry: RSI < rsi_max + macd_hist rising
      rsi_max: 30                       # exclusive ceiling;
      min_hist_delta_atr: 0.18          # ATR-multiple;
    short: # held-long exit: overbought trigger
      rsi_min: 65                       # exclusive floor; higher = more overbought
      min_hist_delta_atr: 0.05          # ATR-multiple; (row - prev) <= -this * atr
    short_entry: # Counter-trend short into rally (mirror of long)
      rsi_min: 70                       # exclusive floor; symmetric mirror of long.rsi_max
      min_hist_delta_atr: 0.08          # ATR-multiple; (row - prev) <= -this * atr

  exits: # block: held-position exit toggles (all default true)
    regime_flip: true                 # exit held LONG when broad-market trend != BULL
    momentum_fade: true               # exit held LONG on momentum-fade trigger
    mean_rev: true                    # exit held LONG on overbought mean-reversion trigger
    # Regime-flip exit shaping (A/B levers; defaults reproduce the exit-on-any-
    # non-BULL-bar behavior byte-for-byte):
    regime_flip_bear_only: false      # true: exit only on BEAR (CHOP no longer flattens)
    regime_flip_confirm_bars: 1       # N>1: require the flip to persist N bars before exiting
    # Held-SHORT exit toggles (default true; cheap insurance)
    regime_flip_short: true           # cover held SHORT when broad-market trend != BEAR
    short_cover_pop: true             # cover held SHORT on momentum-pop trigger
    short_cover_oversold: true        # cover held SHORT on oversold + upturn

  stop_loss: # block: position-sizing & R:R structure
    atr_multiplier: 2.5                 # stop = close - atr*atr_multiplier (wider stops survive noise)
    min_rr: 2.5                         # target = close + risk*min_rr; ratio gate (balanced vs 2.0/3.0)
      # min_rr_short: 2.5                 # optional R:R gate for SHORTS only.
      #   Shorts have bounded upside (price floor $0), so a
    #   tighter reward ceiling can be justified. Absent →
    #   falls back to min_rr above. Only affects shorts.

  overextension: # S1: veto entries already stretched far from the mean (parabolic chasing)
    enabled: false                      # default OFF → byte-identical baseline; validate (DSR+RC) before ON
    bb_z_max: 2.5                       # veto a long when Bollinger z (close−mid)/σ > this (short: < −this)

  pead:                                 # post-earnings-drift entry (opt-in; default OFF → baseline byte-identical)
    enabled: false                      # master switch; true emits PEAD long entries the day after a strong earnings reaction
    min_priors: 8                       # require this many of the ticker's own past reactions before PEAD can fire
    tercile_pct: 0.667                  # fire when the reaction's abnormal return >= this percentile of the ticker's priors


# ── CHRONIC-LOSER PENALTY ────────────────────────────────────────────────────
# Per-ticker sliding-scale size penalty after consecutive losses inside a
# rolling window.
chronic_loser_penalty:
  enabled: false                        # master switch
  lookback_days: 90                     # losses older than this age off the streak
  # Scale: consecutive_losses_threshold → size_mult. Monotonic floors, NO hard
  # block — forward expectancy stays POSITIVE even after 4+ consecutive losses
  # (~+0.11R), so 4+ floors at 0.25 rather than blocking. The multiplier uses the
  # largest key ≤ streak (see core/ticker_health.py).
  scale: # consecutive_losses_threshold → size_mult
    2: 0.5                              # 2 losses in window → half size
    3: 0.25                             # 3+ → quarter size (floor)
