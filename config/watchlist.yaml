# ─────────────────────────────────────────────────────────────────────────────
# TradAlert — watchlist.yaml (v2 — diversified universe)
# Master ticker list. Loaded by core.fetchers.fetcher._load_config().
#
# Replaces v1 (watchlist_v1_survivors.yaml) to kill survivorship bias.
# ~130 tier_a tickers split across asset classes; no single bucket > 15%.
#
# Suffix conventions
#   .TO   Toronto Stock Exchange (TSX)
#   (none) US exchanges (NYSE / NASDAQ)
#
# Two-tier structure
#   tier_a  — scanned + tradeable (current watchlist)
#   tier_b  — fetched for RP ranking only; promoted when RP rank ≥ threshold
#             AND signal fires (Phase 2 universe expansion)
# ─────────────────────────────────────────────────────────────────────────────

# ── Tier A: scanned + tradeable ──────────────────────────────────────────────
tier_a:

  # ── Market context (engine regime — do not remove) ────────────────────────
  - SPY                                 # S&P 500
  - QQQ                                 # Nasdaq 100
  - ^VIX                                # context only

  # ── US broad indices (size/style sweep) ───────────────────────────────────
  - DIA                                 # Dow 30
  - IWM                                 # Russell 2000 small caps
  - IWB                                 # Russell 1000 large caps
  - MDY                                 # S&P 400 mid caps
  - IJR                                 # S&P 600 small caps
  - VTI                                 # total market

  # ── US sectors (full 11, equal weight) ────────────────────────────────────
  - XLK                                 # tech
  - XLF                                 # financials
  - XLE                                 # energy
  - XLV                                 # health care
  - XLI                                 # industrials
  - XLP                                 # consumer staples
  - XLY                                 # consumer discretionary
  - XLU                                 # utilities
  - XLB                                 # materials
  - XLRE                                # real estate
  - XLC                                 # communication services

  # ── Factor / style ────────────────────────────────────────────────────────
  # MTUM / SIZE / SPHB pruned 2026-05-27 — chronic 0% WR; see postmortem.
  - QUAL                                # quality
  - USMV                                # low volatility
  - VLUE                                # value
  - SPLV                                # low vol large
  - VIG                                 # dividend growth

  # ── International equity ──────────────────────────────────────────────────
  - EFA                                 # developed ex-US
  - VEA                                 # developed ex-US (alt)
  - EEM                                 # emerging markets
  - VWO                                 # emerging markets (alt)
  - EWJ                                 # Japan
  # EWG / EWU pruned 2026-05-27 — chronic 0% WR; see postmortem.
  - EWZ                                 # Brazil
  - INDA                                # India
  - FXI                                 # China large
  - MCHI                                # China broad
  - EWY                                 # South Korea
  - EWT                                 # Taiwan

  # ── Bonds / rates ─────────────────────────────────────────────────────────
  - TLT                                 # 20+ year Treasuries
  - IEF                                 # 7-10 year Treasuries
  - SHY                                 # 1-3 year Treasuries
  - TIP                                 # TIPS
  - LQD                                 # investment grade corp
  - HYG                                 # high yield corp
  - EMB                                 # emerging market debt
  - MUB                                 # munis

  # ── Commodities ───────────────────────────────────────────────────────────
  - GLD                                 # gold
  - SLV                                 # silver
  # USO pruned 2026-05-27 — chronic 0% WR (gap/contango). DBC + CPER cover commodity space.
  - UNG                                 # natural gas
  - DBC                                 # broad commodity
  - DBA                                 # agriculture
  - CPER                                # copper
  - URA                                 # uranium

  # ── Currencies ────────────────────────────────────────────────────────────
  - UUP                                 # USD bull
  - FXE                                 # euro
  - FXY                                 # yen

  # ── Real estate ───────────────────────────────────────────────────────────
  - VNQ                                 # US REITs
  - VNQI                                # ex-US REITs
  - REM                                 # mortgage REITs

  # ── Themes (long enough history to backtest) ──────────────────────────────
  - SOXX                                # semis index (trade the THEME)
  - SMH                                 # alt semis
  - IBB                                 # biotech
  - XBI                                 # biotech equal-weight
  - KRE                                 # regional banks
  - KWEB                                # China internet
  - ICLN                                # clean energy
  - TAN                                 # solar
  # LIT pruned 2026-05-27 — chronic 0% WR; see postmortem.
  - JETS                                # airlines
  - ITA                                 # aerospace & defense
  - PHO                                 # water
  - ARKK                                # disruptive innovation (stress test)

  # ── Canadian (TSX) — keep what you actually trade ─────────────────────────
  - ZQQ.TO                              # Nasdaq-100 hedged CAD
  - XIU.TO                              # TSX 60
  - XIC.TO                              # TSX composite
  - ENB.TO                              # Enbridge
  - RY.TO                               # Royal Bank
  - TD.TO                               # TD Bank
  - CNQ.TO                              # Canadian Natural
  # SU.TO / SHOP.TO pruned 2026-05-27 — chronic 0% WR; see postmortem.

  # ── Individual stocks — 16 with explicit thesis ───────────────────────────
  # mega-cap stable: MSFT, JPM, JNJ, KO
  # cyclicals: CAT, DE
  # defensives: PG, WMT
  # volatile growth stress test: NVDA, TSLA
  # energy: XOM, CVX
  # tech: GOOGL, AAPL, AMZN, META
  - MSFT
  - GOOGL
  - AAPL
  - AMZN
  - META
  - NVDA
  - JPM
  - JNJ
  - KO
  - PG
  - WMT
  - XOM
  - CVX
  - CAT
  - TSLA

# ── Tier B: RP ranking only ────────────────────
tier_b:
  - sp500: true                         # auto-fetch full S&P 500 constituent list
  - tsx60: true                         # auto-fetch full TSX 60 constituent list
  - exclude: [ "ACO.X.TO", ]
# ── RP promotion rules ──────────────────────────────────────────────────────
# F5-D / F5-10: previously defined `rp_promotion:` here, but no code consumes
# it — the tier_b → tier_a promotion flow described in the audit was never
# implemented. Block removed to avoid the false impression that promotions
# are gated. When Phase 2 universe expansion is wired up, restore the keys.

# ── Survivorship / selection audit (Phase A1) ─────────────────────────────────
# Inputs for scripts/frozen_universe_ab.py. Quantifies how much of the backtest
# edge is hindsight: newer ETFs that didn't exist early were included, and losers
# were deleted after they lost (see the "pruned …" comments above). Free, no
# external data (the pruned names need a one-time fetch: scripts/fetch_prices.py).
survivorship_audit:
  as_of_dates: ["2005-01-01", "2010-01-01", "2015-01-01"]  # sweep; report discount at each
  # Names removed from tier_a AFTER seeing them lose. Re-added to the frozen
  # universe for as-of dates >= their inception (you would NOT have known to prune
  # them at the time). The pruning bias is usually larger than the look-ahead bias.
  pruned_losers: [MTUM, SIZE, SPHB, EWG, EWU, USO, LIT, SU.TO, SHOP.TO]
  max_hold_days: 25         # apply the shipped cap so the audit reflects the real strategy
  max_hold_mode: hard
