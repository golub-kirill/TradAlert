#
# Suffix conventions
#   .TO   Toronto Stock Exchange (TSX)
#   (none) US exchanges (NYSE / NASDAQ)
#
# Two-tier structure
#   tier_a  — scanned + tradeable (current watchlist)
#   tier_b  — fetched for RP ranking only; promoted when RP rank >= threshold
#             AND signal fires (two-tier universe expansion)
# ─────────────────────────────────────────────────────────────────────────────

