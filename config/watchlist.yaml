# ─────────────────────────────────────────────────────────────────────────────
# TradAlert — watchlist.yaml (v3 — big diversified universe)
# Master ticker list. Loaded by core.fetchers.fetcher._load_config().
#
# Designed to FIGHT survivorship bias, not feed it: names are NOT pruned for past
# P&L (deleting losers inflates the backtest without predicting winners). The list
# is large and diversified on purpose — a broad universe is the opposite of a
# hindsight-picked one, and it proves the logic is universe-agnostic (NORTH STAR #2).
#
# Composition note: v3 adds a deep Canadian (.TO) bench plus liquid US large-caps,
# so individual stocks are now a larger share than the prior ETF-heavy v2. Single-
# name gap/earnings risk is higher; the earnings buffer + gap-risk gate + open-risk
# budget (5.0) are the controls. The ATR%>=1.0 entry gate auto-skips quiet names
# (bonds/FX/low-vol) on any given day — they stay listed for asset-class breadth.
#
# Suffix conventions
#   .TO   Toronto Stock Exchange (TSX)
#   (none) US exchanges (NYSE / NASDAQ)
#
# Two-tier structure
#   tier_a  — scanned + tradeable (current watchlist)
#   tier_b  — fetched for RP ranking only; promoted when RP rank >= threshold
#             AND signal fires (two-tier universe expansion)
# ─────────────────────────────────────────────────────────────────────────────

