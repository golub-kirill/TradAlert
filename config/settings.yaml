# ─────────────────────────────────────────────────────────────────────────────
# TradAlert — settings.yaml
# Read by main.py, fetcher.py, cache.py, json_cache.py.
# All keys are optional — code falls back to the defaults shown in [brackets].
# ─────────────────────────────────────────────────────────────────────────────


# ── STORAGE ───────────────────────────────────────────────────────────────────
# Cache directories, freshness windows, log level.

storage: # block: paths + cache freshness + logging
  cache_dir: "data/prices"           # OHLCV parquet cache; fetcher.py [data/prices]
  log_level: "INFO"                  # DEBUG | INFO | WARNING | ERROR | CRITICAL [INFO]

  # ── staleness windows (hours) ───────────────────────────────────────────────
  # Each fetcher consults storage.staleness_<section> first via
  # persistence.json_cache.staleness_for(); falls back to staleness_hours;
  # then to the per-fetcher hard-coded default.
  staleness_hours: 12        # OHLCV parquet (cache.py) [12]
  staleness_info: 24        # market cap (info_fetcher.py) [24]
  staleness_next_earnings: 24        # next earnings date (earnings_fetcher.py) [24]
  staleness_earnings_history: 168       # full earnings history; 7d (earnings_history.py) [168]


# ── FETCHER ───────────────────────────────────────────────────────────────────
# Parallel watchlist fetch via ThreadPoolExecutor.

fetcher: # block: concurrency
  max_workers: 14


# ── RISK BUDGET ───────────────────────────────────────────────────────────────
# Aggregate open-risk cap the live scanner is budget-aware of. Mirrors the
# portfolio backtest's max_open_risk (validated default 5.0 R). The scanner is an
# ALERTER — it surfaces consumed-vs-budget and flags entries that would exceed the
# cap, plus each signal's size_mult, but never auto-executes.

risk: # block: live open-risk budget awareness
  max_open_risk: 5.0                   # aggregate open-risk cap in R units [5.0]


# ── SCANNER ───────────────────────────────────────────────────────────────────
# Chart rendering options.

scanner: # block: chart rendering

  chart: # block: chart rendering options
    signal_history: true                # render historical signal markers on charts


# ── MACRO DATA LAYER ──────────────────────────────────────────────
# FRED, BoC Valet, and yfinance macro series.  Fetched once per pipeline run.
# Each series cached as parquet in series_dir.

macro: # block: macro data configuration
  enabled: true                         # master toggle; false → no macro regime
  fred_api_key_env: "FRED_API_KEY"      # env var name for the FRED API key
  staleness_hours: 24                   # re-fetch interval for all macro series
  series_dir: "data/macro"              # parquet cache directory
  series_subset: null                   # null = all series; or list of series IDs

  # ── FRED series ────────────────────────────────────────────────────────────
  fred_series:
    - FEDFUNDS                          # Effective Federal Funds Rate
    - DFEDTAR                           # Federal Funds Target Range - Upper Limit
    - DGS3MO                            # 3-Month Treasury Constant Maturity Rate
    - DGS2                              # 2-Year Treasury Constant Maturity Rate
    - DGS10                             # 10-Year Treasury Constant Maturity Rate
    - DFII10                            # 10-Year Treasury Inflation-Indexed Sec
    - CPIAUCSL                          # Consumer Price Index for All Urban
    - PCEPILFE                          # Personal Consumption Expenditures Excl
    - BAMLH0A0HYM2                      # ICE BofA US High Yield Index OAS
    - BAMLC0A0CM                        # ICE BofA US Corp Index OAS
    - WALCL                             # Assets: Total Assets, Total Assets
    - WTREGEN                           # Treasury General Account
    - RRPONTSYD                         # Overnight Reverse Repurchase Agreements

  # ── BoC Valet series ───────────────────────────────────────────────────────
  boc_series:
    - V39079                            # BoC overnight rate target
    - BD.CDN.2YR.DQ.YLD                 # GoC 2-year benchmark bond yield (was V39055, retired)
    - BD.CDN.5YR.DQ.YLD                 # GoC 5-year benchmark bond yield (was V39056, retired)
    - BD.CDN.10YR.DQ.YLD                # GoC 10-year benchmark bond yield (was V39057, retired)

  # ── yfinance macro tickers ─────────────────────────────────────────────────
  yf_series:
    - DX-Y.NYB                          # US Dollar Index (DXY)
    - CAD=X                             # USD/CAD exchange rate
    - CL=F                              # WTI crude oil
    - NG=F                              # Natural gas
    - BZ=F                              # Brent crude (WCS spread proxy)

  # ── Macro regime classifier ──────────────────────────────────────
  size_mult_floor: 0.25                 # minimum position size when fully risk-off
  size_mult_ceiling: 1.0                # maximum position size when fully risk-on

  risk_on_weights: # per-axis state → [0, 1] risk value
    policy_stance_us: { HIKING: 0.0, HOLD: 0.5, CUTTING: 1.0 }
    policy_stance_ca: { HIKING: 0.0, HOLD: 0.5, CUTTING: 1.0 }
    curve_state: { INVERTED: 0.3, STEEPENING_FROM_INVERTED: 0.0, FLAT: 0.6, NORMAL: 1.0 }
    credit_state: { WIDE: 0.0, WIDENING: 0.2, NORMAL: 0.7, TIGHT: 1.0 }
    liquidity_trend: { CONTRACTING: 0.2, FLAT: 0.6, EXPANDING: 1.0 }
    inflation_state: { ACCELERATING: 0.4, STABLE: 0.7, DECELERATING: 1.0 }
    real_yield_state: { HIGH_POSITIVE: 0.4, NORMAL: 0.8, NEGATIVE: 1.0 }
    dollar_state: { STRONG_RISING: 0.4, STABLE: 0.8, WEAK_FALLING: 1.0 }
    oil_state: { RISING: 0.5, STABLE: 0.7, FALLING: 0.8 }
    wcs_spread_state: { WIDE: 0.3, NORMAL: 0.7 }
    earnings_breadth: { DETERIORATING: 0.2, STABLE: 0.7, IMPROVING: 1.0 }

  axis_weights: # how much each axis counts in composite
    policy_stance_us: 3
    curve_state: 4
    credit_state: 4
    liquidity_trend: 3
    inflation_state: 2
    real_yield_state: 2
    dollar_state: 1
    oil_state: 1
    earnings_breadth: 2


# ── BEHAVIORAL DATA LAYER ─────────────────────────────────────────
# COT, NAAIM, AAII, breadth, sector rotation.
# Fetched once per pipeline run.  Stale data > 14 days treated as missing.

behavioral: # block: behavioral data configuration
  enabled: true                         # master toggle; false → no behavioral regime
  data_dir: "data/behavioral"           # cache directory
  stale_window_days: 14                 # days before data is treated as missing
  size_mult_floor: 0.25                 # minimum position size when behavioral risk is fully off
  size_mult_ceiling: 1.0                # maximum position size when fully on

  behavioral_weights: # per-axis state → [0, 1] behavioral value
    breadth_state: { WEAK: 0.0, DETERIORATING: 0.2, NEUTRAL: 0.6, STRONG: 1.0 }
    sector_cycle: { DEFENSIVE_LEAD: 0.2, LATE: 0.4, MID: 0.7, EARLY: 1.0 }
    positioning_state: { CROWDED_LONG: 0.3, NEUTRAL: 1.0, CROWDED_SHORT: 0.8 }
    sentiment_state: { EUPHORIA: 0.3, NORMAL: 1.0, FEAR: 0.7, PANIC: 0.9 }

  axis_weights: # how much each axis counts in composite
    breadth_state: 4
    sector_cycle: 2
    positioning_state: 2
    sentiment_state: 1

  breadth_divergence_penalty: 0.2       # subtracted from behavioral_score when True


# ── TELEGRAM ──────────────────────────────────────────────────────────────────
# Push alerts (phase 1) + interactive daemon (phase 2). Token/chat id live in
# config/secrets.env (TG_BOT_TOKEN / TG_CHAT_ID), never here. All keys optional;
# master switch OFF → the scan is byte-identical to no-telegram.
telegram:
  enabled: true              # master switch for the daily push (main.py hook)
  daemon_enabled: true       # attach inline action buttons (the phase-2 daemon answers them)
  parse_mode: HTML            # HTML | MarkdownV2
  send_stand_down: true      # send a "no signals today" message when the alert set is empty
  compact: false              # media-group (no buttons) instead of per-signal photos
  alert_types:                # which fired signals to push
    - long_entry
    - exit_long
    - short_entry
    - exit_short
  mute: []                    # ticker blocklist, e.g. ["TSLA"]